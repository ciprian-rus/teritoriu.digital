name: Mirror official SIRUTA source

on:
  schedule:
    - cron: "17 4 * * 3"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: acquire-siruta
  cancel-in-progress: false

jobs:
  mirror:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install
        run: npm ci --ignore-scripts
      - name: Unit and policy tests
        run: npm test
      - name: Validate, mirror and register official snapshot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: npm run acquire:siruta -- --publish --direct-resource

      - name: Explain promotion boundary
        if: success()
        run: |
          echo "The official bytes are mirrored and the observation is audited."
          echo "A new snapshot remains unpromoted until canonicalization, review and explicit approval."
